# ICT 交易信号 Bot 配置(SMC 管线 2026-06-10 删除:365d -16.9R / 730d -146.8R 全负)
exchange: okx                   # binance / okx。okx 不受 geo 限制,Lightsail/美东部署用它
symbol: ETHUSDT                 # USDT 永续
timeframes:                     # 需要订阅的 K 线周期
  - 1m                          # 仅用于聚合实时数据；不驱动状态机
  - 15m                         # SignalTracker TP1/SL/trail 扫描粒度
  - 1h                          # ICT:liquidity_raid 扫描 + pending MSS retest 检查
  - 4h                          # ICT:OB / OTE 扫描 + dealing range
  - 1d                          # ICT:daily bias gate

timezone: America/New_York      # 交易日分界时区
daily_reset_hour: 17            # 17:00 ET = CME 收盘，作为"昨日/今日"分界

volume_profile:
  buckets: 200                  # VP 价格分档数(现仅用于日志观测 + daily_vp 落盘)
  value_area_pct: 0.70          # VA 覆盖比例

binance:
  ws_base: wss://fstream.binance.com
  # 若需要代理填 socks5://host:port，否则留空字符串
  proxy: ""
  # 指数退避参数
  reconnect_min: 1
  reconnect_max: 60

storage:
  db_path: data/market.db

# 重启后回放:用近 N 小时 K 线驱动 ICT engine,恢复 active_signals。
# 0 = 禁用(仅做数据回填,state 从空开始,每次部署丢失进行中信号)
replay_hours: 24

# 心跳通知:每 N 小时主动 TG 推一条 bot 状态(0 = 关闭)
# 即使 0 NOTIFIED 也能让用户知道 bot 活着 + 看见的市况
heartbeat_hours: 6

logging:
  level: INFO

signal:
  signal_ttl_seconds: 129600  # 36h:信号 TTL(ICT engine 读取;limit 单未成交过期)

# ============================================================
# ICT (Inner Circle Trader) Engine — 项目唯一信号 pipeline
# ============================================================
# 回测基准(2026-06-10,教科书确认 gate + displacement 0.0):
#   365d:150-168 信号 / ~37% WR / ΣR +37 ~ +40
#   730d:301 信号 / 33.8% WR / ΣR +22.5(前一年 -20 后一年 +43,regime 依赖见 gbrain)
ict:
  # 主开关:engine_enabled=false 时 ICT engine 装载但所有 on_candle_close 立即 return
  # 2026-06-10:SMC 删除后 ICT 是唯一信号源 —— false = bot 只剩心跳/数据采集,不推任何信号
  engine_enabled: true

  # 4 种 ICT POI 类型独立开关(每种可单独 toggle):
  pois:
    ob: false                      # 2026-07 关闭:净成本期望≤0(1095d 扣12bp转负),毛利全靠单笔+7.94R(去掉即转负),p=0.89 统计死信号,3/4年净负,730d/1095d 双窗一致(scripts/_verify_ob.py)
    ote: true                      # OTE 62-79% retracement(365d:89 信号 / 36% WR / +13.4R)— 主力
    liquidity_raid: true           # 扫荡反转 + 教科书 MSS 确认(365d:34 信号 / 39% WR / +16.4R)
    mss_retest: false              # 4h MSS retest(加教科书 gate 后 365d 16 单打平,不值得开)

  # RR 最低门槛(mss_retest 路径使用;原 iFVG 配置,iFVG 已随 SMC 管线删除)
  ifvg_rr_min: 1.0

  # 教科书 ICT 确认 gate(2026-06-09 补足)—— displacement / MSS 确认
  # ICT 的 edge 来自"机构位移"(displacement 会在 3-candle 留下 FVG)。缺这道证据的
  # setup 退化成"猜反转",trending 市场系统性失败。三处接入:
  #   - OTE:leg 必须是位移腿(leg 内有方向一致 FVG)
  #   - liquidity_raid:扫荡后必须有反向位移确认(turtle soup 的 MSS 腿)
  #   - mss_retest:突破必须是位移,区分真 MSS 与裸 CHoCH
  require_displacement: true       # 反转类(raid+mss_retest)位移确认。365d:raid -8.9R→+16.4R
  ote_require_displacement: false  # OTE 额外 FVG 过滤。365d 实测净亏(-10R):OTE 位移已由
                                   # swing_min_move_mult=1.5 腿幅保证,额外 gate 过度约束,默认 OFF
  displacement_min_height_atr: 0.0 # 位移 FVG 最小高度(×ATR)。0.0=任意方向 FVG 即确认。
                                   # 365d:raid 34单/+16.4R,比 0.25(14单)样本更厚更稳;0.5 崩(勿上调)
  raid_confirm_within_bars: 5      # liquidity_raid 反向位移 FVG / sweep 窗口(根)

  # HTF gates 之 ① Daily MSS bias
  daily_bias_enabled: true         # 违反 daily bias 方向的 ICT 信号被否决
  daily_bias_lookback: 30          # ATR pivot 在 D1 上找 swing 的窗口(根)
  daily_bias_min_move_mult: 0.5    # ATR pivot 最小波动倍数(0.5 捕捉到 5-7 这种内部 MSS)

  # HTF gates 之 ② Premium/Discount zone
  premium_discount_enabled: true   # premium zone 拒 long,discount zone 拒 short
  dealing_range_lookback: 60       # 4h dealing range 窗口(根)
  dealing_range_min_move_mult: 2.0 # 4h ATR pivot 最小波动倍数(只识别大波动)
  premium_threshold: 0.55          # >=55% 分位 = premium → veto long
  discount_threshold: 0.45         # <=45% 分位 = discount → veto short

  # HTF gates 之 ③ 4h MSS bias —— daily 滞后时的早期预警
  # 测试结论(2026-06-09 30d):救 5-7 那 2 单 long 但误杀 4 个 short winners,
  # ΣR 从 +13.68R 跌到 +7.82R。daily 滞后的代价比 4h gate 误杀小。默认 OFF。
  h4_bias_enabled: false
  h4_bias_lookback: 60             # 4h ATR pivot 窗口(根)
  h4_bias_min_move_mult: 0.5       # 0.5 = 灵敏,但太敏感误拦反弹中的 short

  # ============================================================
  # OTE 专项改进(2026-06-23,1095d 4 年 OOS 验证,逐年皆改善 + 回撤下降)
  # ============================================================
  # #1 OTE 趋势门:OTE 必须顺 30d 动量趋势(1h MA720 + 7d 斜率),逆势 OTE 否决。
  #    这是正交于 daily/4h bias 的维度 —— 那俩是结构 MSS,这个是 MA 动量,故能补漏。
  #    诊断:逆 30d 趋势的 OTE 1095d 共 −19R(WR 17.9%),是 −20R 烂年的主源。
  #    OOS:#1 单独把 730d +29→+48R,2025 由 −13.9→+4.7,2026 不动(非过拟合)。
  ote_trend_gate_enabled: true
  ote_trend_ma_bars: 720           # 30d on 1h(MA 长度;斜率固定看 7d=168 根)

  # #2 OTE 定倍 TP:OTE 的 TP 由 'dealing range 对侧/3R' 改为定倍 R。
  #    诊断:DR 对侧对 raid 最优(+23.9R),但对 OTE 反而吃掉赢家(+1.1R);
  #    OTE 改定倍 2.5R 后 +1.1→+20.5R。2.5-3R 是平台(非尖峰),取 2.5 更稳。
  #    0 = 关闭(回退原 DR/3R 逻辑)。仅作用于 OTE;raid/ob 仍用 DR 对侧。
  ote_tp_fixed_rr: 2.5
