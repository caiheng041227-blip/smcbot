# SMC/ICT 数据采集层配置
exchange: okx                   # binance / okx。okx 不受 geo 限制,Lightsail/美东部署用它
symbol: ETHUSDT                 # Binance USDT 永续
timeframes:                     # 需要订阅的 K 线周期
  - 1m                          # 仅用于聚合实时数据；不驱动状态机
  - 15m                         # Step5 CHoCH 确认、Step6 入场
  - 1h                          # Step2+3(扫荡事件)、Step4 POI
  - 4h                          # Step1 方向共识 + 结构反转检查
  - 1d                          # Step1 方向共识参考

timezone: America/New_York      # 交易日分界时区
daily_reset_hour: 17            # 17:00 ET = CME 收盘，作为"昨日/今日"分界

volume_profile:
  buckets: 200                  # VP 价格分档数（可调）
  value_area_pct: 0.70          # VA 覆盖比例（SMC/ICT 标准 70%）

# 相关性参考品种:Step1 方向共识要求 BTC 不与 ETH 冲突。
# BTC 崩盘时 ETH 的 SMC 结构通常会失效,这个过滤能避开大部分"反转失败"场景。
reference:
  symbol: BTCUSDT
  timeframe: 4h        # 只订阅这一根 kline 够用,不要额外订阅浪费连接

binance:
  ws_base: wss://fstream.binance.com
  # 若需要代理填 socks5://host:port，否则留空字符串
  proxy: ""
  # 指数退避参数
  reconnect_min: 1
  reconnect_max: 60

storage:
  db_path: data/market.db

# 重启后回放:用近 N 小时 K 线驱动 state_machine,恢复 active_signals。
# 0 = 禁用(仅做数据回填,state 从空开始,每次部署丢失进行中信号)
# 24 = 回放近 24h(推荐:覆盖 Step1 36h TTL 的大部分场景)
replay_hours: 24

# 心跳通知:每 N 小时主动 TG 推一条 bot 状态(0 = 关闭)
# 即使 0 NOTIFIED 也能让用户知道 bot 活着 + 看见的市况
heartbeat_hours: 6

logging:
  level: INFO

signal:
  swing_lookback: 5
  ob_lookback: 120              # 在最近 120 根 4h (≈20 天) 内搜索 OB 候选
  choch_confirm: close        # 只用收盘价确认 BOS/CHoCH，避免影线假突破
  score_threshold: 3.0           # 2026-04-20 scorer 重构后(满分 5),阈值 3 = POI 良好 tier + ≥1 个证据
  signal_ttl_seconds: 129600  # 36h:Step1 TTL(Step2+ 不受时间限制)
  risk_reward_min: 2.0        # 已弃用(TP 由用户手动决定)
  level_proximity_pct: 0.005  # 0.5%:Step2 已降级为参考,主要判定改为"K 线影线触碰"
  # 场景失效阈值(除时间 TTL 外的前提性判定)
  # price_drift_pct: 已删除 —— 漂移不是有效的失效信号,误杀太多
  poi_break_pct: 0.01         # C: 收盘价穿透 POI 边界阈值(与 0.5×ATR_4h 取大)
  sweep_wick_body_ratio: 1.5  # 扫荡事件长影线阈值(原 2.0 放宽)

# ============================================================
# ICT (Inner Circle Trader) Engine — 与 SMC 并行的独立 pipeline
# ============================================================
# 架构:ict_signal/ 是独立 engine,默认 OFF。开启后与 SMC engine 同时跑,
# 各自生成信号,共用 SignalTracker。
# Phase A 内含:HTF gates(daily bias + premium/discount)+ iFVG 反向二次入场。
# Phase B 计划:结构 SL trail (LH/HL) + HTF CHoCH 退出 + BOS 确认。
ict:
  # 主开关:engine_enabled=false 时 ICT engine 装载但所有 on_candle_close 立即 return
  engine_enabled: false

  # 4 种 ICT POI 类型独立开关(每种可单独 toggle):
  pois:
    ob: true                       # ICT OB at premium/discount(187d:5 闭合 / 60% WR / +9R)
    ote: true                      # OTE 62-79% retracement(187d:50 闭合 / 48% WR / +31R)— 主力
    liquidity_raid: true           # 流动性扫荡反转(187d:0 触发 — 1h 级别条件稀少)
    mss_retest: false              # 4h MSS retest(2 步状态机机制对,但 187d -35R,setup 在此市场不行)

  # iFVG reversed 入场参数(消费 SMC 4h_fvg SL'd POI)
  ifvg_rr_min: 1.0                 # RR 最低门槛(老门槛 1.5 太严,sl_hit_extreme 作 TP 常达不到)

  # HTF gates 之 ① Daily MSS bias
  daily_bias_enabled: true         # 违反 daily bias 方向的 ICT 信号被否决
  daily_bias_lookback: 30          # ATR pivot 在 D1 上找 swing 的窗口(根)
  daily_bias_min_move_mult: 0.5    # ATR pivot 最小波动倍数(0.5 捕捉到 5-7 这种内部 MSS)

  # HTF gates 之 ② Premium/Discount zone
  premium_discount_enabled: true   # premium zone 拒 long,discount zone 拒 short
  dealing_range_lookback: 60       # 4h dealing range 窗口(根)
  dealing_range_min_move_mult: 2.0 # 4h ATR pivot 最小波动倍数(只识别大波动)
  premium_threshold: 0.55          # >=55% 分位 = premium → veto long
  discount_threshold: 0.45         # <=45% 分位 = discount → veto short

  # HTF gates 之 ③ 4h MSS bias —— daily 滞后时的早期预警
  # 测试结论(2026-06-09 30d):救 5-7 那 2 单 long 但误杀 4 个 short winners,
  # ΣR 从 +13.68R 跌到 +7.82R。daily 滞后的代价比 4h gate 误杀小。默认 OFF。
  h4_bias_enabled: false
  h4_bias_lookback: 60             # 4h ATR pivot 窗口(根)
  h4_bias_min_move_mult: 0.5       # 0.5 = 灵敏,但太敏感误拦反弹中的 short

